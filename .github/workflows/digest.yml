name: Daily AI News Digest

permissions:
  contents: read
  issues: write 

on:
  schedule:
    - cron: "0 17 * * *"        # 12:00 EST / 13:00 EDT (America/New_York)
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
      GITHUB_TOKEN: ${{ github.token }}
      DIGEST_OUTPUT_FILE: news.md

    steps:
      - uses: actions/checkout@v4

      - name: Skip if today's digest already exists
        if: github.event_name == 'schedule'
        id: preflight
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().slice(0,10);
            const query = `
              query($owner: String!, $repo: String!, $cursor: String) {
                repository(owner: $owner, name: $repo) {
                  issues(first: 100, after: $cursor, states: OPEN, orderBy: {field: CREATED_AT, direction: DESC}) {
                    nodes {
                      number
                      createdAt
                      labels(first: 20) {
                        nodes {
                          name
                        }
                      }
                    }
                    pageInfo {
                      hasNextPage
                      endCursor
                    }
                  }
                }
              }
            `;

            let existing = null;
            let cursor = null;
            let hasNextPage = true;

            while (!existing && hasNextPage) {
              const result = await github.graphql(query, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                cursor
              });
              const issues = result.repository.issues;
              existing = issues.nodes.find(issue =>
                issue.createdAt.slice(0, 10) === today &&
                issue.labels.nodes.some(label => label.name === 'ai-digest')
              );
              cursor = issues.pageInfo.endCursor;
              hasNextPage = issues.pageInfo.hasNextPage;
            }

            const shouldSkip = existing ? 'true' : 'false';

            core.setOutput('should_skip', shouldSkip);

            if (existing) {
              core.notice(`Skipping digest build because issue #${existing.number} already exists for ${today}.`);
            } else {
              core.notice(`No existing digest issue found for ${today}; continuing.`);
            }
      
      - name: Install uv
        if: steps.preflight.outputs.should_skip != 'true'
        uses: astral-sh/setup-uv@v3
        
      - name: Set up Python 3.12
        if: steps.preflight.outputs.should_skip != 'true'
        run: uv python install 3.12
        
      - name: Install dependencies
        if: steps.preflight.outputs.should_skip != 'true'
        run: uv sync --locked

      - name: Validate required secrets
        if: steps.preflight.outputs.should_skip != 'true'
        run: |
          if [ -z "${OPENAI_API_KEY}" ]; then
            echo "Missing OPENAI_API_KEY secret." >&2
            exit 1
          fi
        
      - name: Build digest with LangGraph
        if: steps.preflight.outputs.should_skip != 'true'
        run: uv run python src/main.py

      - name: Create or update issue
        if: steps.preflight.outputs.should_skip != 'true'
        run: uv run python src/main.py --publish-issue
